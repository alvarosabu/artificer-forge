templateId: chest_common
type: interactable
subtype: container
name: Wooden Chest

locked: false
lockDifficulty: 0

hp: 20
maxHp: 20
destructible: true

model: /models/interactables/Chest.glb
animations:
  default: closed
  states:
    closed:
      target: chest_lid
      rotation: { x: 0, y: 0, z: 0 }  # values are Math.PI multipliers
    open:
      target: chest_lid
      rotation: { x: -0.6, y: 0, z: 0 }  # -0.6π ≈ -108°

lootTable:
  - id: healing_potion
    quantity: 1
    chance: 1.0
